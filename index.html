<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Kanji </title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        font-family: Arial, sans-serif;
        transition: background 0.3s, color 0.3s;
    }

    /* THEMES */
    body.light {
        background: #ffffff;
        color: #000;
    }

    body.dark {
        background: #121212;
        color: #fff;
    }

    /* IMAGE */
    #img {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        transition: opacity 0.3s ease;
    }

    /* TOP BAR (NEW) */
    .topbar {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        border-radius: 10px;
        font-size: 12px;
        opacity: 0.2;
        transition: opacity 0.3s;
    }

    .topbar:hover {
        opacity: 1;
    }

    /* SLIDER */
    input[type="range"] {
        width: 120px;
        height: 3px;
        appearance: none;
        border-radius: 2px;
        outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        cursor: pointer;
    }

    /* BUTTON */
    .toggle {
        border: none;
        padding: 3px 6px;
        font-size: 11px;
        border-radius: 6px;
        cursor: pointer;
    }

    /* LIGHT MODE */
    body.light .topbar {
        background: rgba(0,0,0,0.05);
    }

    body.light input[type="range"] {
        background: rgba(0,0,0,0.2);
    }

    body.light input[type="range"]::-webkit-slider-thumb {
        background: #333;
    }

    body.light .toggle {
        background: #eee;
        color: #000;
    }

    /* DARK MODE */
    body.dark .topbar {
        background: rgba(255,255,255,0.05);
    }

    body.dark input[type="range"] {
        background: rgba(255,255,255,0.2);
    }

    body.dark input[type="range"]::-webkit-slider-thumb {
        background: #aaa;
    }

    body.dark .toggle {
        background: #333;
        color: #fff;
    }

</style>
</head>

<body>

<div class="topbar">
    <span id="value">3s</span>
    <input type="range" id="slider" min="0" max="10" value="3">
    <button class="toggle" id="toggleBtn">🌙</button>
</div>

const img = document.getElementById("img");
const slider = document.getElementById("slider");
const valueLabel = document.getElementById("value");
const toggleBtn = document.getElementById("toggleBtn");

let timer = null;

/* THEME */
let theme = localStorage.getItem("theme");

if (!theme) {
    theme = window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark" : "light";
}

setTheme(theme);

function setTheme(mode) {
    document.body.className = mode;
    localStorage.setItem("theme", mode);
    toggleBtn.innerText = mode === "dark" ? "☀️" : "🌙";
}

toggleBtn.onclick = () => {
    const newTheme = document.body.classList.contains("dark") ? "light" : "dark";
    setTheme(newTheme);
};

/* SLIDESHOW */
function showRandom() {
    img.style.opacity = 0;

    setTimeout(() => {
        const i = Math.floor(Math.random() * images.length);
        img.src = images[i];
        img.style.opacity = 1;
    }, 120);
}

function start() {
    stop();

    let delay = parseInt(slider.value);
    valueLabel.innerText = delay + "s";

    if (delay === 0) return;

    timer = setInterval(showRandom, delay * 1000);
}

function stop() {
    if (timer) {
        clearInterval(timer);
        timer = null;
    }
}

slider.oninput = start;

// Tap next when paused
img.onclick = () => {
    if (slider.value == 0) {
        showRandom();
    }
};

// Init
showRandom();
start();

</script>
